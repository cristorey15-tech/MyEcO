<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="%BASE_URL%icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="%BASE_URL%icons/icon-512x512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%icons/apple-touch-icon.png" />
    <link rel="apple-touch-startup-image" href="%BASE_URL%icons/icon-2048x2048.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" />
    <link rel="apple-touch-startup-image" href="%BASE_URL%icons/icon-2048x2048.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="%BASE_URL%icons/icon-2048x2048.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image" href="%BASE_URL%icons/icon-2048x2048.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="MyEco - Controla tus ingresos, gastos y finanzas personales" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MyEco" />
    <meta name="msapplication-TileColor" content="#2563eb" />
    <meta name="msapplication-TileImage" content="%BASE_URL%icons/icon-192x192.png" />
    <meta name="application-name" content="MyEco" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>MyEco - Finanzas Personales</title>
    <style>
      /* Splash screen / loading animation */
      .splash-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
        transition: opacity 0.5s ease;
      }
      .splash-loader.hidden {
        opacity: 0;
        pointer-events: none;
        transition: none;
      }
      .splash-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        padding: 20px;
      }
      .splash-logo {
        width: 64px;
        height: 64px;
        animation: pulse 2s ease-in-out infinite;
      }
      .splash-title {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 24px;
        font-weight: 700;
        color: #1e293b;
        letter-spacing: -0.02em;
      }
      .splash-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #2563eb;
        margin: 0 3px;
        animation: bounce 1.4s ease-in-out infinite both;
      }
      .splash-dot:nth-child(1) { animation-delay: -0.32s; }
      .splash-dot:nth-child(2) { animation-delay: -0.16s; }
      .splash-dot:nth-child(3) { animation-delay: 0s; }
      .splash-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e2e8f0;
        border-top-color: #2563eb;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.8; }
      }
      @keyframes bounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
        40% { transform: scale(1); opacity: 1; }
      }
      @media (prefers-color-scheme: dark) {
        .splash-loader {
          background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
        .splash-title {
          color: #e2e8f0;
        }
        .splash-spinner {
          border-color: #334155;
          border-top-color: #818cf8;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="splash-loader" id="splash">
        <div class="splash-content">
          <svg class="splash-logo" viewBox="0 0 48 46" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z" fill="url(#logoGradient)"/>
            <defs>
              <linearGradient id="logoGradient" x1="0" y1="0" x2="48" y2="46">
                <stop offset="0%" stop-color="#6366f1"/>
                <stop offset="100%" stop-color="#2563eb"/>
              </linearGradient>
            </defs>
          </svg>
          <div class="splash-title">MyEco</div>
          <div class="splash-spinner"></div>
        </div>
      </div>
    </div>
    <script>
      // Hide splash screen when React mounts
      const splash = document.getElementById('splash');
      if (splash) {
        // Fallback: hide splash after 5s even if React fails to load
        setTimeout(() => splash.classList.add('hidden'), 5000);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
